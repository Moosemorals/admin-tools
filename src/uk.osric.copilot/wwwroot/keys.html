<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Key Management</title>
  <link rel="stylesheet" href="/css/app.css" />
  <style>
    body { display: block; padding: 1.5rem; overflow: auto; height: auto; }
    h1   { font-size: 1.2rem; color: var(--blue); margin-bottom: 1.25rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 1.25rem; margin-bottom: 1.25rem; }
    .row  { display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; }
    .field { flex: 1; min-width: 160px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--text-muted); }
    input[type=text], input[type=number], input[type=email], select {
      padding: 0.45rem 0.65rem; border: 1px solid var(--border); border-radius: 4px;
      font: inherit; width: 100%; background: var(--bg); color: var(--text);
    }
    input:focus, select:focus { outline: none; border-color: var(--blue); }
    .btn { padding: 0.45rem 1rem; border: none; border-radius: 4px; cursor: pointer; font: inherit; font-weight: 600; white-space: nowrap; }
    .btn-primary { background: var(--btn-bg); color: #fff; border: 1px solid var(--btn-border); }
    .btn-primary:hover { background: var(--btn-hover); }
    .btn-danger  { background: none; color: var(--red); border: 1px solid var(--red); font-size: 0.8rem; padding: 0.3rem 0.65rem; border-radius: 4px; }
    .btn-danger:hover { background: var(--red); color: #fff; }
    .btn-small   { background: none; color: var(--blue); border: 1px solid var(--blue); font-size: 0.8rem; padding: 0.3rem 0.65rem; border-radius: 4px; }
    .btn-small:hover { background: var(--blue); color: var(--bg); }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { background: var(--hover); text-align: left; padding: 0.5rem 0.7rem; border-bottom: 2px solid var(--border); color: var(--text-muted); }
    td { padding: 0.45rem 0.7rem; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--text); }
    tr:hover td { background: var(--hover); }
    .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 3px; font-size: 0.75rem; font-weight: 700; }
    .badge-valid   { background: color-mix(in srgb, var(--green) 15%, transparent); color: var(--green); }
    .badge-expired { background: color-mix(in srgb, var(--yellow) 15%, transparent); color: var(--yellow); }
    .badge-revoked { background: color-mix(in srgb, var(--red) 15%, transparent); color: var(--red); }
    .msg { padding: 0.65rem 1rem; border-radius: 4px; margin-top: 0.75rem; font-size: 0.875rem; }
    .msg-ok  { background: color-mix(in srgb, var(--green) 15%, transparent); color: var(--green); }
    .msg-err { background: color-mix(in srgb, var(--red) 15%, transparent); color: var(--red); }
    #table-section { display: none; }
    .actions { display: flex; gap: 0.4rem; }
    code { font-size: 0.78rem; word-break: break-all; color: var(--text-muted); }
  </style>
</head>
<body>
  <h1>Email Key Management</h1>

  <div class="card">
    <div class="row">
      <div class="field">
        <label for="emailInput">Email address</label>
        <input type="email" id="emailInput" placeholder="user@example.com" />
      </div>
      <div class="field" style="max-width:160px">
        <label for="daysInput">Validity (days)</label>
        <input type="number" id="daysInput" value="365" min="1" max="3650" />
      </div>
      <div class="field" style="max-width:160px">
        <label for="keyTypeSelect">Key type</label>
        <select id="keyTypeSelect">
          <option value="Ecdsa">ECDSA P-256</option>
          <option value="Rsa">RSA 2048</option>
        </select>
      </div>
      <button class="btn btn-primary" id="generateBtn">Generate</button>
      <button class="btn btn-primary" id="loadBtn" style="background:none;color:var(--text);border:1px solid var(--border)">Load</button>
    </div>
    <div id="genMsg"></div>
  </div>

  <div class="card" id="table-section">
    <table id="certsTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Fingerprint</th>
          <th>Not Before</th>
          <th>Not After</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="certsBody"></tbody>
    </table>
  </div>

  <script type="module" src="/js/keys.js"></script>
</body>
</html>
