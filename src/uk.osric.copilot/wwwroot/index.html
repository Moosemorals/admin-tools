<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copilot CLI Wrapper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      font-size: 13px;
      background: #0d1117;
      color: #c9d1d9;
      display: grid;
      grid-template-rows: auto 1fr;
      grid-template-columns: 220px 1fr;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      grid-column: 1 / -1;
      padding: 10px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 15px; color: #58a6ff; flex: 1; }
    #status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #21262d;
      color: #8b949e;
    }
    #status.connected { color: #3fb950; }
    #status.error     { color: #f85149; }

    /* ── Sidebar ── */
    aside#sidebar {
      background: #161b22;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #new-session-btn {
      margin: 10px 10px 6px;
      background: #238636;
      color: #fff;
      border: 1px solid #2ea043;
      border-radius: 6px;
      padding: 6px 10px;
      font: inherit;
      cursor: pointer;
      text-align: left;
    }
    #new-session-btn:hover   { background: #2ea043; }
    #new-session-btn:disabled { opacity: .4; cursor: not-allowed; }

    #session-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .session-item {
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 2px;
      position: relative;
    }
    .session-item:hover  { background: #21262d; }
    .session-item.active { background: #21262d; border-left: 2px solid #58a6ff; }
    .session-title {
      color: #c9d1d9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 18px; /* room for delete btn */
    }
    .session-ts {
      color: #8b949e;
      font-size: 10px;
    }
    .unread-dot {
      position: absolute;
      right: 8px;
      top: 8px;
      color: #58a6ff;
      font-size: 10px;
    }
    .session-delete-btn {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #6e7681;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      display: none;
    }
    .session-item:hover .session-delete-btn { display: block; }
    .session-delete-btn:hover { color: #f85149; background: #21262d; }

    /* ── Main area ── */
    main#main-area {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Feeds ── */
    #feeds {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .session-feed {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 10px 16px;
      display: none;
      flex-direction: column;
      gap: 6px;
    }
    .session-feed.active { display: flex; }

    /* ── Empty state ── */
    #no-session-msg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8b949e;
      font-size: 13px;
    }

    /* ── Event card ── */
    .event-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      overflow: hidden;
    }
    .event-card > summary {
      padding: 6px 10px;
      cursor: pointer;
      display: flex;
      align-items: baseline;
      gap: 8px;
      list-style: none;
      user-select: none;
    }
    .event-card > summary::-webkit-details-marker { display: none; }
    .event-card > summary::before       { content: "▶"; font-size: 9px; color: #8b949e; }
    .event-card[open] > summary::before { content: "▼"; }

    .event-type { font-weight: 700; color: #79c0ff; }
    .event-ts   { color: #8b949e; font-size: 11px; margin-left: auto; }

    /* ── Property rows ── */
    .props { padding: 4px 10px 8px 20px; display: flex; flex-direction: column; gap: 3px; }

    .prop-row    { display: flex; align-items: baseline; gap: 6px; }
    .prop-key    { color: #d2a8ff; min-width: 140px; flex-shrink: 0; }
    .prop-scalar { color: #a5d6ff; white-space: pre-wrap; word-break: break-all; }
    .prop-null   { color: #6e7681; font-style: italic; }
    .prop-bool   { color: #79c0ff; }
    .prop-number { color: #f2cc60; }
    .prop-string { color: #a5d6ff; }

    /* ── Nested details ── */
    .nested-details { width: 100%; }
    .nested-details > summary {
      cursor: pointer;
      color: #8b949e;
      list-style: none;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .nested-details > summary::-webkit-details-marker { display: none; }
    .nested-details > summary::before       { content: "▶"; font-size: 9px; }
    .nested-details[open] > summary::before { content: "▼"; }
    .nested-details > summary .prop-key  { color: #d2a8ff; }
    .nested-details > summary .preview   { color: #8b949e; font-size: 11px; }
    .nested-content { padding: 3px 0 0 16px; display: flex; flex-direction: column; gap: 3px; }

    pre.prop-value {
      white-space: pre-wrap;
      word-break: break-all;
      color: #a5d6ff;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 4px;
      padding: 6px 8px;
      margin-top: 3px;
      font-size: 12px;
      max-height: 400px;
      overflow-y: auto;
    }

    /* ── Reply form ── */
    .reply-form {
      padding: 8px 10px 10px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      border-top: 1px solid #21262d;
      margin-top: 4px;
    }
    .reply-choices { display: flex; flex-wrap: wrap; gap: 4px; }
    .choice-btn {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 3px 10px;
      font: inherit;
      cursor: pointer;
    }
    .choice-btn:hover    { border-color: #58a6ff; color: #58a6ff; }
    .choice-btn.selected { background: #1f3d5e; border-color: #58a6ff; color: #a5d6ff; }
    .reply-input {
      flex: 1;
      min-width: 180px;
      background: #0d1117;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 4px 8px;
      font: inherit;
    }
    .reply-input:focus   { outline: none; border-color: #58a6ff; }
    .reply-btn {
      background: #238636;
      color: #fff;
      border: 1px solid #2ea043;
      border-radius: 4px;
      padding: 4px 12px;
      font: inherit;
      cursor: pointer;
    }
    .reply-btn:hover    { background: #2ea043; }
    .reply-btn:disabled { opacity: .4; cursor: not-allowed; }
    .reply-confirmed    { color: #3fb950; font-size: 12px; }
    .reply-error        { color: #f85149; font-size: 12px; }

    /* ── Input area ── */
    #input-area {
      padding: 10px 16px;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      gap: 8px;
    }
    #prompt {
      flex: 1;
      background: #0d1117;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit;
      resize: none;
      height: 60px;
    }
    #prompt:focus        { outline: none; border-color: #58a6ff; }
    #send-btn {
      background: #238636;
      color: #fff;
      border: 1px solid #2ea043;
      border-radius: 6px;
      padding: 0 18px;
      font: inherit;
      cursor: pointer;
      align-self: flex-end;
      height: 36px;
    }
    #send-btn:hover    { background: #2ea043; }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Event-type colour hints ── */
    .event-card.type-assistant { border-left: 3px solid #3fb950; }
    .event-card.type-user      { border-left: 3px solid #58a6ff; }
    .event-card.type-tool      { border-left: 3px solid #f2cc60; }
    .event-card.type-session   { border-left: 3px solid #bc8cff; }
    .event-card.type-error     { border-left: 3px solid #f85149; }
    .event-card.type-system    { border-left: 3px solid #8b949e; }
  </style>
</head>
<body>

<header>
  <h1>⚡ Copilot CLI Wrapper</h1>
  <span id="status">connecting…</span>
</header>

<aside id="sidebar">
  <button id="new-session-btn">+ New Session</button>
  <div id="session-list"></div>
</aside>

<main id="main-area">
  <div id="feeds">
    <div id="no-session-msg">Select or create a session to begin</div>
  </div>
  <div id="input-area">
    <textarea id="prompt" placeholder="Select or create a session…" disabled></textarea>
    <button id="send-btn" disabled>Send</button>
  </div>
</main>

<script>
  const statusEl      = document.getElementById('status');
  const newSessionBtn = document.getElementById('new-session-btn');
  const sessionList   = document.getElementById('session-list');
  const feedsEl       = document.getElementById('feeds');
  const noSessionMsg  = document.getElementById('no-session-msg');
  const promptEl      = document.getElementById('prompt');
  const sendBtn       = document.getElementById('send-btn');

  // ── State ────────────────────────────────────────────────────────────────────
  let activeSessionId = null;
  /** @type {Map<string, HTMLDivElement>} sessionId → feed element */
  const feedElements  = new Map();
  /** @type {Set<string>} sessionIds whose history has already been loaded */
  const loadedHistory = new Set();

  // ── Initialise ───────────────────────────────────────────────────────────────
  async function init() {
    try {
      const sessions = await fetch('/sessions').then(r => r.json());
      for (const s of sessions) {
        addSessionToSidebar(s);
        ensureFeed(s.id);
      }
      if (sessions.length > 0) {
        await switchToSession(sessions[0].id);
      }
    } catch (err) {
      console.error('Failed to load sessions:', err);
    }
    connectSSE();
  }

  init();

  // ── SSE connection ────────────────────────────────────────────────────────────
  function connectSSE() {
    const es = new EventSource('/events');

    es.onopen = () => {
      statusEl.textContent = 'connected';
      statusEl.className   = 'connected';
    };

    es.onmessage = (e) => {
      try {
        handleEvent(JSON.parse(e.data));
      } catch (err) {
        console.error('Failed to parse SSE message:', err, e.data);
      }
    };

    es.onerror = () => {
      statusEl.textContent = 'disconnected – retrying…';
      statusEl.className   = 'error';
    };
  }

  // ── Event routing ─────────────────────────────────────────────────────────────
  function handleEvent(data) {
    if (data._eventType === 'SessionCreated') {
      const record = {
        id: data.sessionId,
        title: data.title,
        lastActiveAt: data.lastActiveAt,
      };
      addSessionToSidebar(record);
      ensureFeed(record.id);
      loadedHistory.add(record.id); // brand-new session has no prior history
      switchToSession(record.id);
      return;
    }

    const sessionId = data._sessionId;
    if (!sessionId) return; // service-level synthetic events (ServiceReady, etc.)

    ensureFeed(sessionId);
    const feed = feedElements.get(sessionId);
    const card = renderEventCard(data);
    feed.insertBefore(card, feed.firstChild);

    if (sessionId !== activeSessionId) {
      const item = document.querySelector(`.session-item[data-session-id="${sessionId}"]`);
      if (item) item.querySelector('.unread-dot').hidden = false;
    }
  }

  // ── Sidebar ───────────────────────────────────────────────────────────────────
  function addSessionToSidebar(record) {
    // Don't add duplicates.
    if (document.querySelector(`.session-item[data-session-id="${record.id}"]`)) return;

    const item = document.createElement('div');
    item.className = 'session-item';
    item.dataset.sessionId = record.id;

    const title = document.createElement('span');
    title.className   = 'session-title';
    title.textContent = record.title;

    const ts = document.createElement('span');
    ts.className   = 'session-ts';
    ts.textContent = relativeTime(record.lastActiveAt);

    const dot = document.createElement('span');
    dot.className = 'unread-dot';
    dot.textContent = '●';
    dot.hidden = true;

    const del = document.createElement('button');
    del.className = 'session-delete-btn';
    del.textContent = '×';
    del.title = 'Delete session';
    del.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm(`Delete session "${record.title}"?`)) return;
      try {
        await fetch(`/sessions/${record.id}`, { method: 'DELETE' });
        item.remove();
        feedElements.get(record.id)?.remove();
        feedElements.delete(record.id);
        loadedHistory.delete(record.id);
        if (activeSessionId === record.id) {
          activeSessionId = null;
          noSessionMsg.style.display = 'flex';
          promptEl.disabled = true;
          promptEl.placeholder = 'Select or create a session…';
          sendBtn.disabled = true;
        }
      } catch (err) {
        console.error('Failed to delete session:', err);
      }
    });

    item.appendChild(title);
    item.appendChild(ts);
    item.appendChild(dot);
    item.appendChild(del);
    item.addEventListener('click', () => switchToSession(record.id));
    sessionList.appendChild(item);
  }

  function ensureFeed(sessionId) {
    if (feedElements.has(sessionId)) return;
    const div = document.createElement('div');
    div.className = 'session-feed';
    feedsEl.appendChild(div);
    feedElements.set(sessionId, div);
  }

  async function switchToSession(sessionId) {
    if (activeSessionId === sessionId) return;

    // Deactivate old feed.
    if (activeSessionId && feedElements.has(activeSessionId)) {
      feedElements.get(activeSessionId).classList.remove('active');
    }

    activeSessionId = sessionId;
    noSessionMsg.style.display = 'none';

    ensureFeed(sessionId);
    feedElements.get(sessionId).classList.add('active');

    // Update sidebar selection + clear unread dot.
    document.querySelectorAll('.session-item').forEach(el => {
      el.classList.toggle('active', el.dataset.sessionId === sessionId);
    });
    const item = document.querySelector(`.session-item[data-session-id="${sessionId}"]`);
    if (item) item.querySelector('.unread-dot').hidden = true;

    promptEl.disabled     = false;
    promptEl.placeholder  = 'Send instructions to Copilot… (Ctrl+Enter to send)';
    sendBtn.disabled      = false;

    // Load history on first visit.
    if (!loadedHistory.has(sessionId)) {
      loadedHistory.add(sessionId);
      try {
        const msgs = await fetch(`/sessions/${sessionId}/messages`).then(r => r.json());
        const feed = feedElements.get(sessionId);
        for (const msg of msgs) {
          feed.insertBefore(renderEventCard(msg), feed.firstChild);
        }
      } catch (err) {
        console.error('Failed to load history for', sessionId, err);
      }
    }
  }

  // ── New-session button ────────────────────────────────────────────────────────
  newSessionBtn.addEventListener('click', async () => {
    newSessionBtn.disabled = true;
    try {
      const res = await fetch('/sessions', { method: 'POST' });
      if (!res.ok) console.error('Failed to create session:', await res.text());
      // SessionCreated SSE event will handle sidebar + switch.
    } catch (err) {
      console.error('Network error creating session:', err);
    } finally {
      newSessionBtn.disabled = false;
    }
  });

  // ── Send prompt ───────────────────────────────────────────────────────────────
  async function sendPrompt() {
    if (!activeSessionId) return;
    const text = promptEl.value.trim();
    if (!text) return;

    sendBtn.disabled  = true;
    promptEl.disabled = true;

    try {
      const res = await fetch(`/sessions/${activeSessionId}/send`, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: text,
      });
      if (!res.ok) {
        const msg = await res.text();
        prependToActive({ _eventType: 'SendError', _timestamp: new Date().toISOString(), message: msg });
      } else {
        promptEl.value = '';
      }
    } catch (err) {
      prependToActive({ _eventType: 'NetworkError', _timestamp: new Date().toISOString(), error: String(err) });
    } finally {
      sendBtn.disabled  = false;
      promptEl.disabled = false;
      promptEl.focus();
    }
  }

  sendBtn.addEventListener('click', sendPrompt);
  promptEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); sendPrompt(); }
  });

  function prependToActive(data) {
    if (!activeSessionId || !feedElements.has(activeSessionId)) return;
    const feed = feedElements.get(activeSessionId);
    feed.insertBefore(renderEventCard(data), feed.firstChild);
  }

  // ── Event rendering ───────────────────────────────────────────────────────────
  const LARGE_STRING_THRESHOLD = 120;

  function renderEventCard(data) {
    const eventType = data._eventType ?? 'Unknown';
    const timestamp = data._timestamp ? formatTs(data._timestamp) : '';

    const card = document.createElement('details');
    card.className = `event-card ${colorClass(eventType)}`;

    if (/AssistantMessage|SessionError|SendError|NetworkError|UserInput/.test(eventType)) {
      card.open = true;
    }

    const summary = document.createElement('summary');
    summary.innerHTML =
      `<span class="event-type">${esc(eventType)}</span>` +
      `<span class="event-ts">${esc(timestamp)}</span>`;
    card.appendChild(summary);

    const props = document.createElement('div');
    props.className = 'props';

    for (const [key, value] of Object.entries(data)) {
      if (key.startsWith('_')) continue;
      props.appendChild(renderProp(key, value));
    }

    card.appendChild(props);

    if (eventType === 'UserInputRequested' && data.requestId) {
      appendReplyForm(card, data);
    }

    return card;
  }

  function renderProp(key, value) {
    if (value !== null && typeof value === 'object') {
      return renderNestedDetails(key, value);
    }
    if (typeof value === 'string' && value.length > LARGE_STRING_THRESHOLD) {
      return renderLargeString(key, value);
    }

    const row = document.createElement('div');
    row.className = 'prop-row';

    const k = document.createElement('span');
    k.className   = 'prop-key';
    k.textContent = key;
    row.appendChild(k);

    const v = document.createElement('span');
    v.className   = `prop-scalar ${scalarClass(value)}`;
    v.textContent = value === null ? 'null' : String(value);
    row.appendChild(v);

    return row;
  }

  function renderNestedDetails(key, value) {
    const d = document.createElement('details');
    d.className = 'nested-details';

    const s = document.createElement('summary');
    s.innerHTML =
      `<span class="prop-key">${esc(key)}</span>` +
      `<span class="preview">${esc(previewOf(value))}</span>`;
    d.appendChild(s);

    const content = document.createElement('div');
    content.className = 'nested-content';
    if (Array.isArray(value)) {
      value.forEach((item, i) => content.appendChild(renderProp(String(i), item)));
    } else {
      for (const [k, v] of Object.entries(value)) {
        content.appendChild(renderProp(k, v));
      }
    }

    d.appendChild(content);
    return d;
  }

  function renderLargeString(key, value) {
    const d = document.createElement('details');
    d.className = 'nested-details';

    const preview = value.slice(0, 60).replace(/\s+/g, ' ') + '…';
    const s = document.createElement('summary');
    s.innerHTML =
      `<span class="prop-key">${esc(key)}</span>` +
      `<span class="preview">${esc(preview)}</span>`;
    d.appendChild(s);

    const pre = document.createElement('pre');
    pre.className   = 'prop-value';
    pre.textContent = value;
    d.appendChild(pre);

    return d;
  }

  // ── User-input reply form ─────────────────────────────────────────────────────
  function appendReplyForm(card, data) {
    const form = document.createElement('div');
    form.className = 'reply-form';

    let selectedChoice = null;
    let input = null;

    // Choice buttons
    if (Array.isArray(data.choices) && data.choices.length > 0) {
      const choicesDiv = document.createElement('div');
      choicesDiv.className = 'reply-choices';
      data.choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className   = 'choice-btn';
        btn.textContent = choice;
        btn.addEventListener('click', () => {
          choicesDiv.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selectedChoice = choice;
          if (input) input.value = choice;
          if (!data.allowFreeform) submitReply();
        });
        choicesDiv.appendChild(btn);
      });
      form.appendChild(choicesDiv);
    }

    // Freeform text input
    if (data.allowFreeform || !Array.isArray(data.choices) || data.choices.length === 0) {
      input = document.createElement('input');
      input.type        = 'text';
      input.className   = 'reply-input';
      input.placeholder = 'Type your reply…';
      input.addEventListener('keydown', e => { if (e.key === 'Enter') submitReply(); });
      form.appendChild(input);
    }

    // Reply button (only when freeform is allowed or no choices)
    if (data.allowFreeform || !Array.isArray(data.choices) || data.choices.length === 0) {
      const replyBtn = document.createElement('button');
      replyBtn.className   = 'reply-btn';
      replyBtn.textContent = 'Reply';
      replyBtn.addEventListener('click', submitReply);
      form.appendChild(replyBtn);
    }

    card.appendChild(form);

    async function submitReply() {
      const rawAnswer = input ? input.value.trim() : (selectedChoice ?? '');
      const answer = rawAnswer;
      const wasFreeform = !!(input && rawAnswer !== '' && rawAnswer !== selectedChoice);

      form.querySelectorAll('button, input').forEach(el => el.disabled = true);

      try {
        const res = await fetch('/user-input-reply', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ requestId: data.requestId, answer, wasFreeform }),
        });
        if (res.ok) {
          form.innerHTML = `<span class="reply-confirmed">✓ Replied: ${esc(answer || '(empty)')}</span>`;
        } else {
          const errText = await res.text();
          form.innerHTML = `<span class="reply-error">✗ Error: ${esc(errText)}</span>`;
        }
      } catch (err) {
        form.innerHTML = `<span class="reply-error">✗ Network error: ${esc(String(err))}</span>`;
      }
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function formatTs(iso) {
    try {
      return new Date(iso).toLocaleTimeString(undefined, {
        hour12: false, hour: '2-digit', minute: '2-digit',
        second: '2-digit', fractionalSecondDigits: 3,
      });
    } catch { return iso; }
  }

  function relativeTime(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    if (diff < 60_000)         return 'just now';
    if (diff < 3_600_000)      return `${Math.floor(diff / 60_000)}m ago`;
    if (diff < 86_400_000)     return `${Math.floor(diff / 3_600_000)}h ago`;
    return `${Math.floor(diff / 86_400_000)}d ago`;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function scalarClass(value) {
    if (value === null)          return 'prop-null';
    if (typeof value === 'boolean') return 'prop-bool';
    if (typeof value === 'number')  return 'prop-number';
    return 'prop-string';
  }

  function previewOf(value) {
    if (Array.isArray(value)) return `[${value.length} items]`;
    const keys = Object.keys(value);
    if (keys.length === 0) return '{}';
    return `{ ${keys.slice(0, 3).join(', ')}${keys.length > 3 ? ', …' : ''} }`;
  }

  function colorClass(eventType) {
    if (/^Assistant/.test(eventType))   return 'type-assistant';
    if (/^User/.test(eventType))        return 'type-user';
    if (/^Tool/.test(eventType))        return 'type-tool';
    if (/^Session/.test(eventType))     return 'type-session';
    if (/Error|error/.test(eventType))  return 'type-error';
    if (/^System/.test(eventType))      return 'type-system';
    return '';
  }
</script>
