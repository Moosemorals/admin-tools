<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copilot CLI Wrapper</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>

<header>
  <h1>⚡ Copilot CLI Wrapper</h1>
  <span id="status">connecting…</span>
</header>

<aside id="sidebar">
  <button id="new-session-btn">+ New Session</button>
  <div id="session-list"></div>
</aside>

<main id="main-area">
  <div id="feeds">
    <div id="no-session-msg">Select or create a session to begin</div>
    <button id="new-msgs-indicator" hidden aria-live="polite"></button>
  </div>
  <div id="input-area">
    <textarea id="prompt" placeholder="Select or create a session…" disabled></textarea>
    <div id="input-controls">
      <button id="send-btn" disabled>Send</button>
      <span id="send-hint">Ctrl+Enter to send</span>
    </div>
  </div>
</main>

<script type="module" src="/js/app.js"></script>
</body>
</html>
